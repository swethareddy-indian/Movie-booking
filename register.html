<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Booking</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 50px; 
            background: url('down50.jpg') no-repeat center center fixed; 
            background-size: cover;
        }
        form { 
            max-width: 300px; 
            margin: auto; 
            padding: 20px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            background: black; 
        }
        input, select, button { width: 100%; margin: 5px 0; padding: 8px; }
        button { background: green; color: white; border: none; cursor: pointer; }
        img { width: 100px; display: block; margin: auto; }
    </style>
</head>
<body>

    

   <h2 style="color:red; font-size: 50px;">Book Your Ticket</h2>


    <form action="details.html" method="GET">
        <input type="text" placeholder="Full Name" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Phone" required>
        <input type="date" required>
        <button type="submit">booknow</button>
    </form>


</body>
</html>
