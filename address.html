<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Your Address</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: url("address-bg.jpg") no-repeat center center fixed;
            background-size: cover;
            color: white;
        }
        .container {
            margin-top: 50px;
        }
        .address {
            display: inline-block;
            margin: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .address:hover {
            transform: scale(1.1);
        }
        .address p {
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Select Your Location</h1>

<div class="container">
    <div class="address">
        <a href="theatres.html?address=hyderabad">
            <p>Hyderabad</p>
        </a>
    </div>
    <div class="address">
        <a href="theatres.html?address=bangalore">
            <p>Bangalore</p>
        </a>
    </div>
    <div class="address">
        <a href="theatres.html?address=chennai">
            <p>Chennai</p>
        </a>
    </div>
</div>

</body>
</html>
